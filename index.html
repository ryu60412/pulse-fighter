<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pulse Defense v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  * { margin:0; padding:0; box-sizing:border-box;
       -webkit-tap-highlight-color: transparent;
       -webkit-user-select: none; user-select: none; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    touch-action: none;
    background: #0a0a14;
    color: #e0e0ff;
    font-family: 'Consolas', 'Courier New', monospace;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 {
    font-size: clamp(20px, 4vw, 36px);
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .subtitle { color:#8888aa; margin-bottom:10px; font-size:12px; letter-spacing:2px; text-align:center; }
  #wrap {
    position:relative;
    width: min(98vw, calc((100vh - 60px) * 1.5));
    aspect-ratio: 1200 / 800;
    max-width: 1400px;
  }
  canvas#game {
    width:100%; height:100%;
    background:#05050d;
    border:1px solid #1a1a3a;
    box-shadow: 0 0 40px rgba(0,255,255,0.15);
    display:block;
  }
  #ui {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    font-size: clamp(10px, 1.3vw, 13px);
  }
  .panel {
    position:absolute;
    background: rgba(10,10,25,0.9);
    border: 1px solid #2a2a55;
    padding: 8px 12px;
    border-radius:4px;
    pointer-events:auto;
  }
  #topbar {
    top:6px; left:6px; right:6px;
    display:flex; justify-content:space-between; align-items:center;
    background: transparent; border:none; gap:6px; flex-wrap:wrap;
  }
  .stat { background: rgba(10,10,25,0.9); border:1px solid #2a2a55; padding:6px 12px; border-radius:4px; }
  #base-hp { color:#ff66aa; font-weight:bold; }
  #energy { color:#ffff66; font-weight:bold; }
  #wave-info { color:#00ffff; font-weight:bold; }
  #tower-panel {
    right:6px; top:60px;
    width: clamp(120px, 15vw, 180px);
    display:flex; flex-direction:column; gap:6px;
  }
  .tower-btn {
    background:#0a0a1f; border:2px solid #2a2a55;
    padding:8px; border-radius:4px; cursor:pointer;
    transition: all 0.15s; text-align:center;
  }
  .tower-btn:active, .tower-btn:hover { border-color:#00ffff; }
  .tower-btn.selected { border-color:#00ffff; background:#1a1a3a; box-shadow:0 0 12px #00ffff; }
  .tower-btn .name { font-size:11px; font-weight:bold; }
  .tower-btn .cost { font-size:10px; color:#ffff66; margin-top:2px; }
  .tower-icon { width:24px; height:24px; margin:0 auto 4px; border-radius:50%; }
  #control-bar {
    bottom:6px; left:6px; right:6px;
    display:flex; gap:8px; align-items:center;
    background: transparent; border:none;
  }
  #wave-btn {
    background:#1a1a3a; border:1px solid #00ffff;
    color:#00ffff; padding:10px 20px; cursor:pointer;
    border-radius:4px; font-family:inherit; font-size:13px;
    letter-spacing:1px; min-height:40px;
  }
  #wave-btn:active, #wave-btn:hover { background:#00ffff; color:#0a0a1f; }
  #wave-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #waveform-edit {
    flex:1; background:rgba(10,10,25,0.9);
    border:1px solid #2a2a55; border-radius:4px;
    padding:6px 10px; display:none;
  }
  #waveform-edit.active { display:block; }
  #waveform-edit .title { font-size:11px; color:#00ffff; margin-bottom:4px; }
  .sliders-row { display:flex; gap:8px; }
  .slider-mini {
    flex:1; background:rgba(20,20,40,0.6);
    padding:3px 6px; border-radius:3px; border:1px solid #2a2a55;
  }
  .slider-mini .lbl { font-size:9px; color:#aaaadd; display:flex; justify-content:space-between; }
  .slider-mini .val { color:#00ffff; }
  input[type=range] {
    width:100%; -webkit-appearance:none;
    height:4px; background:#1a1a3a; border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:#00ffff; cursor:pointer;
    box-shadow:0 0 4px #00ffff;
  }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,10,0.88); pointer-events:auto; z-index:10;
  }
  .modal {
    background:#0a0a1f; border:1px solid #2a2a55;
    padding: clamp(16px, 3vw, 32px); border-radius:8px;
    text-align:center; box-shadow: 0 0 30px rgba(0,255,255,0.2);
    max-width:90%; max-height:90%; overflow-y:auto;
  }
  .modal h2 { font-size: clamp(20px, 3vw, 28px); color:#00ffff;
              margin-bottom:12px; letter-spacing:3px; }
  .modal p { color:#aaaadd; margin-bottom:12px; font-size: clamp(11px, 1.5vw, 13px); }
  button {
    background:transparent; border:1px solid #00ffff; color:#00ffff;
    padding:12px 28px; font-family:inherit; font-size:13px;
    letter-spacing:2px; cursor:pointer; border-radius:2px;
    transition: all 0.2s; min-height:44px; min-width:140px;
    margin:6px;
  }
  button:active, button:hover { background:#00ffff; color:#0a0a1f; box-shadow:0 0 16px #00ffff; }
  button.magenta { border-color:#ff44ff; color:#ff44ff; }
  button.magenta:active, button.magenta:hover { background:#ff44ff; color:#0a0a1f; }
  .cards { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .card {
    background:#0a0a1f; border:1px solid #2a2a55;
    padding:14px; width: clamp(130px, 22vw, 180px);
    border-radius:4px; cursor:pointer; transition: all 0.2s;
  }
  .card:hover, .card:active { border-color:#00ffff; transform:translateY(-2px);
                              box-shadow:0 0 20px rgba(0,255,255,0.3); }
  .card h3 { color:#00ffff; margin-bottom:6px; font-size:13px; }
  .card p { color:#aaaadd; font-size:11px; line-height:1.4; }
  #vol-panel { display:flex; align-items:center; gap:6px; }
  #vol-panel input[type=range] { width: 60px; }
  #mute-btn {
    background:transparent; border:1px solid #2a2a55;
    color:#aaaadd; padding:2px 6px; cursor:pointer;
    border-radius:2px; font-size:13px;
  }
  .small { font-size:10px; color:#666688; }
</style>
</head>
<body>

<h1>PULSE DEFENSE</h1>
<div class="subtitle">— v4 / Tower Defense —</div>

<div id="wrap">
  <canvas id="game" width="1200" height="800"></canvas>
  <div id="ui">
    <div id="topbar">
      <div class="stat">BASE HP: <span id="base-hp">100</span></div>
      <div class="stat">ENERGY: <span id="energy">150</span></div>
      <div class="stat" id="wave-info">WAVE 0 / 10</div>
      <div class="stat" id="vol-panel">
        <button id="mute-btn">🔊</button>
        <input type="range" id="volume" min="0" max="100" value="40">
      </div>
    </div>
    <div class="panel" id="tower-panel">
      <div style="font-size:11px;color:#00ffff;text-align:center;margin-bottom:4px;">TOWERS</div>
      <div class="tower-btn" data-type="0">
        <div class="tower-icon" style="background:#ffdd44;box-shadow:0 0 8px #ffdd44;"></div>
        <div class="name">Photon</div><div class="cost">⚡30</div>
      </div>
      <div class="tower-btn" data-type="1">
        <div class="tower-icon" style="background:#00ffff;box-shadow:0 0 8px #00ffff;"></div>
        <div class="name">Pulse Laser</div><div class="cost">⚡40</div>
      </div>
      <div class="tower-btn" data-type="2">
        <div class="tower-icon" style="background:#ff44ff;box-shadow:0 0 8px #ff44ff;"></div>
        <div class="name">Resonance</div><div class="cost">⚡55</div>
      </div>
      <div class="tower-btn" data-type="3">
        <div class="tower-icon" style="background:#aa44ff;box-shadow:0 0 8px #aa44ff;"></div>
        <div class="name">Disruptor</div><div class="cost">⚡45</div>
      </div>
      <div style="font-size:9px;color:#666;text-align:center;margin-top:4px;">
        右クリック/2本指<br>= タワー除去<br>(50%返金)
      </div>
    </div>
    <div id="control-bar">
      <button id="wave-btn">▶ START WAVE</button>
      <div id="waveform-edit">
        <div class="title">SELECTED TOWER WAVEFORM</div>
        <div class="sliders-row">
          <div class="slider-mini"><div class="lbl">Cap <span class="val" id="cap-val">50</span></div><input type="range" id="cap" min="0" max="100" value="50"></div>
          <div class="slider-mini"><div class="lbl">R <span class="val" id="r-val">30</span></div><input type="range" id="r" min="0" max="100" value="30"></div>
          <div class="slider-mini"><div class="lbl">Pulse <span class="val" id="pulse-val">50</span></div><input type="range" id="pulse" min="0" max="100" value="50"></div>
          <div class="slider-mini"><div class="lbl">Noise <span class="val" id="noise-val">20</span></div><input type="range" id="noise" min="0" max="100" value="20"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="overlay"><div class="modal" id="modal-content"></div></div>
</div>

<div style="color:#555577; margin-top:8px; font-size:11px; text-align:center;">
  タワー選択 → グリッドをタップで設置 / 設置済みタワーをタップで波形調整
</div>

<script>
class SoundEngine {
  constructor() { this.ctx=null; this.master=null; this.muted=false; this.volume=0.35; this.activeNodes=0; this.MAX_NODES=30; }
  init() { if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC(); this.master = this.ctx.createGain();
    this.master.gain.value = this.muted ? 0 : this.volume;
    const c = this.ctx.createDynamicsCompressor();
    c.threshold.value=-12; c.ratio.value=6;
    this.master.connect(c); c.connect(this.ctx.destination); }
  resume() { if (this.ctx && this.ctx.state==='suspended') this.ctx.resume(); }
  setVolume(v) { this.volume=v; if (this.master && !this.muted) this.master.gain.value=v; }
  toggleMute() { this.muted=!this.muted; if (this.master) this.master.gain.value = this.muted ? 0 : this.volume; return this.muted; }
  _env(g,a,d,p) { const n = this.ctx.currentTime;
    g.gain.setValueAtTime(0,n); g.gain.linearRampToValueAtTime(p, n+a);
    g.gain.exponentialRampToValueAtTime(0.0001, n+d); }
  playTone(f,d,t,v) { t=t||'sine'; v=v||0.15;
    if (!this.ctx || this.activeNodes > this.MAX_NODES) return;
    this.activeNodes++;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=t; o.frequency.value=f; this._env(g,0.005,d,v);
    o.connect(g); g.connect(this.master);
    o.start(); o.stop(this.ctx.currentTime+d);
    o.onended = () => this.activeNodes--; }
  playNoise(d,v) { v=v||0.15;
    if (!this.ctx || this.activeNodes > this.MAX_NODES) return;
    this.activeNodes++;
    const sz = Math.floor(this.ctx.sampleRate*d);
    const buf = this.ctx.createBuffer(1, sz, this.ctx.sampleRate);
    const a = buf.getChannelData(0);
    for (let i=0;i<sz;i++) a[i]=Math.random()*2-1;
    const s = this.ctx.createBufferSource(); s.buffer = buf;
    const g = this.ctx.createGain(); this._env(g, 0.002, d, v);
    s.connect(g); g.connect(this.master);
    s.start(); s.onended = () => this.activeNodes--; }
  playShoot(freq) { freq=freq||700;
    if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type='square'; const n = this.ctx.currentTime;
    o.frequency.setValueAtTime(freq, n);
    o.frequency.exponentialRampToValueAtTime(freq*0.5, n+0.06);
    this._env(g, 0.003, 0.06, 0.06);
    o.connect(g); g.connect(this.master);
    o.start(); o.stop(n+0.06); }
  playHit() { this.playNoise(0.04, 0.08); }
  playKill() { this.playNoise(0.15, 0.15); this.playTone(150, 0.2, 'sawtooth', 0.12); }
  playDamage() { this.playNoise(0.15, 0.2); this.playTone(80, 0.2, 'square', 0.15); }
  playSelect() { this.playTone(800, 0.05, 'sine', 0.12); setTimeout(()=>this.playTone(1200, 0.08, 'sine', 0.12), 50); }
  playPlace() { this.playTone(500, 0.05, 'triangle', 0.15); setTimeout(()=>this.playTone(800, 0.08, 'triangle', 0.12), 40); }
  playWaveClear() { [523, 659, 784, 1047].forEach((f,i)=> setTimeout(()=>this.playTone(f, 0.18, 'triangle', 0.15), i*70)); }
  playGameOver() { [400, 300, 200].forEach((f,i)=> setTimeout(()=>this.playTone(f, 0.4, 'sawtooth', 0.18), i*200)); }
}
const sound = new SoundEngine();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const GRID_W = 14, GRID_H = 8;
const CELL_SIZE = 60;
const GRID_OFFSET_X = 60;
const GRID_OFFSET_Y = 70;
const GRID_PIXEL_W = GRID_W * CELL_SIZE;
const GRID_PIXEL_H = GRID_H * CELL_SIZE;

const TOWER_TYPES = [
  { name:'Photon', cost:30, color:'#ffdd44', range:140, baseDmg:25, baseRate:0.8, aoe:false, slow:false },
  { name:'Pulse Laser', cost:40, color:'#00ffff', range:120, baseDmg:8, baseRate:0.2, aoe:false, slow:false },
  { name:'Resonance', cost:55, color:'#ff44ff', range:110, baseDmg:15, baseRate:1.0, aoe:true, slow:false },
  { name:'Disruptor', cost:45, color:'#aa44ff', range:130, baseDmg:5, baseRate:0.6, aoe:false, slow:true }
];

const STATE = { TITLE:0, PLAYING:1, WAVE_RUNNING:2, UPGRADE:3, GAMEOVER:4, WIN:5 };
let state = STATE.TITLE;
let baseHP = 100, energy = 150, wave = 0;
const MAX_WAVES = 10;
let towers = [], enemies = [], bullets = [], particles = [], damageNumbers = [];
let selectedTowerType = -1, selectedTower = null;
let waveActive = false, enemiesRemaining = 0;
let spawnQueue = [], spawnTimer = 0, waveTime = 0;

function screenToCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left) * (W / r.width), y: (clientY - r.top) * (H / r.height) };
}
function cellAt(x, y) {
  const cx = Math.floor((x - GRID_OFFSET_X) / CELL_SIZE);
  const cy = Math.floor((y - GRID_OFFSET_Y) / CELL_SIZE);
  if (cx < 0 || cx >= GRID_W || cy < 0 || cy >= GRID_H) return null;
  return { cx, cy };
}
function cellCenter(cx, cy) {
  return { x: GRID_OFFSET_X + cx * CELL_SIZE + CELL_SIZE/2, y: GRID_OFFSET_Y + cy * CELL_SIZE + CELL_SIZE/2 };
}
function towerAtCell(cx, cy) { return towers.find(t => t.cx === cx && t.cy === cy); }

canvas.addEventListener('mousedown', e => {
  sound.resume();
  const p = screenToCanvas(e.clientX, e.clientY);
  handleClick(p.x, p.y, e.button === 2);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); sound.resume();
  if (e.touches.length === 0) return;
  const t = e.touches[0];
  const p = screenToCanvas(t.clientX, t.clientY);
  handleClick(p.x, p.y, e.touches.length >= 2);
}, { passive: false });

function handleClick(x, y, isRightClick) {
  const cell = cellAt(x, y); if (!cell) return;
  const existing = towerAtCell(cell.cx, cell.cy);
  if (isRightClick && existing) {
    energy += Math.floor(TOWER_TYPES[existing.type].cost * 0.5);
    towers = towers.filter(t => t !== existing);
    if (selectedTower === existing) {
      selectedTower = null;
      document.getElementById('waveform-edit').classList.remove('active');
    }
    sound.playHit(); updateUI(); return;
  }
  if (existing) {
    selectedTower = existing; selectedTowerType = -1;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('waveform-edit').classList.add('active');
    updateSliders(); sound.playSelect(); return;
  }
  if (selectedTowerType < 0) return;
  const type = TOWER_TYPES[selectedTowerType];
  if (energy < type.cost) return;
  energy -= type.cost;
  const center = cellCenter(cell.cx, cell.cy);
  towers.push({ type: selectedTowerType, cx: cell.cx, cy: cell.cy,
    x: center.x, y: center.y,
    wave: { cap:50, r:30, pulse:50, noise:20 },
    cooldown: 0, targetAngle: 0, flash: 0 });
  sound.playPlace(); updateUI();
}

document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedTowerType = parseInt(btn.dataset.type);
    selectedTower = null;
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('waveform-edit').classList.remove('active');
    sound.playSelect();
  });
});

['cap','r','pulse','noise'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    const v = parseInt(e.target.value);
    document.getElementById(id+'-val').textContent = v;
    if (selectedTower) selectedTower.wave[id] = v;
  });
});

function updateSliders() {
  if (!selectedTower) return;
  ['cap','r','pulse','noise'].forEach(id => {
    document.getElementById(id).value = selectedTower.wave[id];
    document.getElementById(id+'-val').textContent = selectedTower.wave[id];
  });
}

document.getElementById('volume').addEventListener('input', e => {
  sound.setVolume(parseInt(e.target.value)/100 * 0.6);
});
document.getElementById('mute-btn').addEventListener('click', e => {
  e.target.textContent = sound.toggleMute() ? '🔇' : '🔊';
});

document.getElementById('wave-btn').addEventListener('click', () => {
  if (waveActive || state !== STATE.PLAYING) return;
  startNextWave();
});

function updateUI() {
  document.getElementById('base-hp').textContent = Math.max(0, baseHP);
  document.getElementById('energy').textContent = energy;
  document.getElementById('wave-info').textContent = 'WAVE ' + wave + ' / ' + MAX_WAVES;
}

function towerDamage(t) {
  const type = TOWER_TYPES[t.type];
  return type.baseDmg * (1 + t.wave.cap/100) * (1 - t.wave.r/300);
}
function towerFireRate(t) {
  const type = TOWER_TYPES[t.type];
  return type.baseRate * (1 - t.wave.pulse/300);
}
function towerCritRate(t) { return 0.05 + t.wave.noise * 0.006; }

function startNextWave() {
  if (wave >= MAX_WAVES) return;
  wave++; waveActive = true;
  document.getElementById('wave-btn').disabled = true;
  const isBoss = (wave === MAX_WAVES);
  const count = isBoss ? 1 : (5 + wave * 3);
  const baseHP_e = Math.round(20 * Math.pow(1.25, wave-1));
  const speed = 0.7 + wave * 0.08;
  spawnQueue = [];
  if (isBoss) {
    spawnQueue.push({ hp: baseHP_e * 30, speed: speed*0.5, radius: 25, isBoss: true });
  } else {
    for (let i=0; i<count; i++) {
      spawnQueue.push({ hp: baseHP_e, speed: speed, radius: 12,
                        lane: Math.floor(Math.random()*GRID_H), isBoss: false });
    }
  }
  enemiesRemaining = spawnQueue.length;
  spawnTimer = 0;
  state = STATE.WAVE_RUNNING;
  updateUI();
}

function spawnEnemy(data) {
  const lane = data.lane !== undefined ? data.lane : Math.floor(Math.random() * GRID_H);
  const center = cellCenter(0, lane);
  enemies.push({ x: -20, y: center.y, hp: data.hp, maxHp: data.hp,
                 speed: data.speed, radius: data.radius, isBoss: data.isBoss,
                 slowTimer: 0, flash: 0 });
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime)/1000, 0.05);
  lastTime = now;
  if (state === STATE.PLAYING || state === STATE.WAVE_RUNNING) update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt) {
  waveTime += dt;
  if (state === STATE.WAVE_RUNNING && spawnQueue.length > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy(spawnQueue.shift());
      spawnTimer = 0.6 + Math.random() * 0.4;
    }
  }
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    let sp = e.speed;
    if (e.slowTimer > 0) { sp *= 0.5; e.slowTimer -= dt; }
    e.x += sp * 60 * dt;
    e.flash = Math.max(0, e.flash - dt);
    if (e.x > GRID_OFFSET_X + GRID_PIXEL_W + 20) {
      baseHP -= e.isBoss ? 50 : 10;
      enemies.splice(i, 1); enemiesRemaining--;
      sound.playDamage(); updateUI();
      if (baseHP <= 0) { baseHP = 0; showGameOver(); return; }
    }
  }
  for (const t of towers) {
    t.cooldown -= dt; t.flash = Math.max(0, t.flash - dt);
    const type = TOWER_TYPES[t.type];
    if (t.cooldown > 0) continue;
    let target = null, bestDist = type.range;
    for (const e of enemies) {
      const d = Math.hypot(e.x - t.x, e.y - t.y);
      if (d < bestDist) { bestDist = d; target = e; }
    }
    if (!target) continue;
    t.targetAngle = Math.atan2(target.y - t.y, target.x - t.x);
    t.cooldown = towerFireRate(t); t.flash = 0.1;
    const dmg = towerDamage(t);
    const isCrit = Math.random() < towerCritRate(t);
    const actualDmg = isCrit ? dmg * 2 : dmg;
    bullets.push({ x: t.x, y: t.y, tx: target.x, ty: target.y, target: target,
      dmg: actualDmg, crit: isCrit, type: t.type, life: 0.3,
      color: type.color, aoe: type.aoe, slow: type.slow, speed: 400 });
    sound.playShoot(700 + t.wave.pulse * 4);
  }
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    const dx = b.tx - b.x, dy = b.ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d < 8 || b.life <= 0) {
      if (b.aoe) {
        for (const e of enemies) {
          const ed = Math.hypot(e.x - b.tx, e.y - b.ty);
          if (ed < 50) applyDamageToEnemy(e, b.dmg * (1 - ed/50), b.crit, b.slow);
        }
        for (let k=0; k<12; k++) {
          particles.push({ x: b.tx, y: b.ty,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
            life: 0.4, color: b.color });
        }
      } else {
        if (b.target && enemies.includes(b.target)) {
          applyDamageToEnemy(b.target, b.dmg, b.crit, b.slow);
        }
      }
      bullets.splice(i, 1); continue;
    }
    b.x += (dx/d) * b.speed * dt;
    b.y += (dy/d) * b.speed * dt;
    if (b.target && enemies.includes(b.target)) { b.tx = b.target.x; b.ty = b.target.y; }
    b.life -= dt;
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y -= 30 * dt; d.life -= dt;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
  if (state === STATE.WAVE_RUNNING && spawnQueue.length === 0 && enemies.length === 0) {
    waveEnd();
  }
}

function applyDamageToEnemy(e, dmg, isCrit, slow) {
  e.hp -= dmg; e.flash = 0.1;
  if (slow) e.slowTimer = 2.0;
  damageNumbers.push({ x: e.x, y: e.y - e.radius - 5,
    text: Math.round(dmg).toString(), life: 0.5, crit: isCrit });
  if (e.hp <= 0) {
    energy += e.isBoss ? 100 : 5;
    sound.playKill();
    for (let k=0; k<8; k++) {
      particles.push({ x: e.x, y: e.y,
        vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
        life: 0.5, color: '#ff66aa' });
    }
    const idx = enemies.indexOf(e);
    if (idx >= 0) enemies.splice(idx, 1);
    enemiesRemaining--; updateUI();
  } else if (isCrit) { sound.playHit(); }
}

function waveEnd() {
  waveActive = false;
  document.getElementById('wave-btn').disabled = false;
  sound.playWaveClear();
  if (wave >= MAX_WAVES) { showWin(); return; }
  energy += 30 + wave * 5;
  state = STATE.PLAYING;
  updateUI(); showUpgradeChoice();
}

function render() {
  ctx.fillStyle = '#05050d';
  ctx.fillRect(0, 0, W, H);
  if (state === STATE.TITLE) { renderTitle(); return; }
  ctx.strokeStyle = 'rgba(40,60,90,0.5)'; ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_W; i++) {
    ctx.beginPath();
    ctx.moveTo(GRID_OFFSET_X + i * CELL_SIZE, GRID_OFFSET_Y);
    ctx.lineTo(GRID_OFFSET_X + i * CELL_SIZE, GRID_OFFSET_Y + GRID_PIXEL_H);
    ctx.stroke();
  }
  for (let i = 0; i <= GRID_H; i++) {
    ctx.beginPath();
    ctx.moveTo(GRID_OFFSET_X, GRID_OFFSET_Y + i * CELL_SIZE);
    ctx.lineTo(GRID_OFFSET_X + GRID_PIXEL_W, GRID_OFFSET_Y + i * CELL_SIZE);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,68,170,0.05)';
  ctx.fillRect(GRID_OFFSET_X - 30, GRID_OFFSET_Y, 30, GRID_PIXEL_H);
  ctx.fillStyle = 'rgba(0,255,255,0.1)';
  ctx.fillRect(GRID_OFFSET_X + GRID_PIXEL_W, GRID_OFFSET_Y, 30, GRID_PIXEL_H);
  ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2;
  ctx.strokeRect(GRID_OFFSET_X + GRID_PIXEL_W, GRID_OFFSET_Y, 30, GRID_PIXEL_H);
  ctx.fillStyle = '#00ffff'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
  ctx.save();
  ctx.translate(GRID_OFFSET_X + GRID_PIXEL_W + 15, GRID_OFFSET_Y + GRID_PIXEL_H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('BASE', 0, 4); ctx.restore();
  if (selectedTower) {
    const t = selectedTower;
    const type = TOWER_TYPES[t.type];
    ctx.beginPath();
    ctx.arc(t.x, t.y, type.range, 0, Math.PI*2);
    ctx.fillStyle = type.color + '22'; ctx.fill();
    ctx.strokeStyle = type.color; ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
  }
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;
  for (const t of towers) {
    const type = TOWER_TYPES[t.type];
    ctx.beginPath(); ctx.arc(t.x, t.y, 18, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a3a'; ctx.fill();
    ctx.strokeStyle = type.color; ctx.lineWidth = 2; ctx.stroke();
    if (t.flash > 0) {
      ctx.beginPath(); ctx.arc(t.x, t.y, 18, 0, Math.PI*2);
      ctx.fillStyle = type.color; ctx.globalAlpha = t.flash * 5;
      ctx.fill(); ctx.globalAlpha = 1;
    }
    ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.targetAngle);
    ctx.fillStyle = type.color; ctx.shadowColor = type.color; ctx.shadowBlur = 8;
    ctx.fillRect(0, -3, 22, 6); ctx.shadowBlur = 0; ctx.restore();
    if (t === selectedTower) {
      ctx.beginPath(); ctx.arc(t.x, t.y, 24, 0, Math.PI*2);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
    }
  }
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.crit ? 4 : 3, 0, Math.PI*2);
    ctx.fillStyle = b.crit ? '#ffffff' : b.color;
    ctx.shadowColor = b.color; ctx.shadowBlur = 8;
    ctx.fill(); ctx.shadowBlur = 0;
  }
  for (const e of enemies) {
    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
    ctx.fillStyle = e.flash > 0 ? '#ffffff' : (e.isBoss ? '#ff0066' : '#ff3366');
    ctx.shadowColor = '#ff3366'; ctx.shadowBlur = e.isBoss ? 20 : 10;
    ctx.fill(); ctx.shadowBlur = 0;
    if (e.slowTimer > 0) {
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+4, 0, Math.PI*2);
      ctx.strokeStyle = '#aa44ff'; ctx.lineWidth = 1; ctx.stroke();
    }
    const bw = e.isBoss ? 60 : 28;
    ctx.fillStyle = '#330011';
    ctx.fillRect(e.x - bw/2, e.y - e.radius - 8, bw, 3);
    ctx.fillStyle = '#ff66aa';
    ctx.fillRect(e.x - bw/2, e.y - e.radius - 8, bw * (e.hp/e.maxHp), 3);
  }
  ctx.font = 'bold 13px Consolas'; ctx.textAlign = 'center';
  for (const d of damageNumbers) {
    ctx.globalAlpha = Math.min(1, d.life * 2);
    ctx.fillStyle = d.crit ? '#ff44ff' : '#ffff88';
    ctx.fillText(d.text + (d.crit ? '!' : ''), d.x, d.y);
  }
  ctx.globalAlpha = 1;
  if (state === STATE.WAVE_RUNNING) {
    ctx.fillStyle = '#ff66aa';
    ctx.font = 'bold 14px Consolas'; ctx.textAlign = 'right';
    ctx.fillText('残り敵: ' + enemiesRemaining, W - 200, GRID_OFFSET_Y - 20);
  }
}

function renderTitle() {
  ctx.fillStyle = '#05050d'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(40,60,90,0.3)'; ctx.lineWidth = 1;
  for (let x=0; x<W; x+=60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y=0; y<H; y+=60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal-content');

function showTitle() {
  state = STATE.TITLE;
  overlay.style.display = 'flex';
  modal.innerHTML = '<h2>PULSE DEFENSE</h2>' +
    '<p>光子観測施設 <span style="color:#00ffff">Outpost OB-7</span> を守れ。</p>' +
    '<p>4種のタワーを配置し、波形を設計せよ。</p>' +
    '<p class="small" style="margin:16px 0;">' +
    'タワー選択 → グリッドをタップで設置<br>' +
    '設置済みタワーをタップ → 波形調整<br>' +
    '右クリック/2本指タップ → タワー除去 (50%返金)<br>' +
    '🎵 音が鳴ります（右上で音量調整）</p>' +
    '<button onclick="startDefenseGame()">▶ START DEFENSE</button>';
}

function startDefenseGame() {
  if (!sound.ctx) sound.init();
  sound.resume();
  overlay.style.display = 'none';
  state = STATE.PLAYING;
  baseHP = 100; energy = 150; wave = 0;
  towers = []; enemies = []; bullets = [];
  particles = []; damageNumbers = []; spawnQueue = [];
  selectedTower = null; selectedTowerType = -1;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('waveform-edit').classList.remove('active');
  updateUI();
}

function showGameOver() {
  state = STATE.GAMEOVER;
  sound.playGameOver();
  overlay.style.display = 'flex';
  modal.innerHTML = '<h2 style="color:#ff44ff;">BASE DESTROYED</h2>' +
    '<p>到達ウェーブ: <span style="color:#00ffff;">' + wave + ' / ' + MAX_WAVES + '</span></p>' +
    '<p>設置タワー数: ' + towers.length + '</p>' +
    '<p class="small">エイリアンに基地を破壊された...</p>' +
    '<button onclick="startDefenseGame()">▶ RETRY</button>' +
    '<button onclick="showTitle()" class="magenta">▶ TITLE</button>';
}

function showWin() {
  state = STATE.WIN;
  sound.playWaveClear();
  setTimeout(() => sound.playWaveClear(), 400);
  overlay.style.display = 'flex';
  modal.innerHTML = '<h2 style="color:#00ffff;">VICTORY!</h2>' +
    '<p>銀河の守護者となった!</p>' +
    '<p>残りHP: <span style="color:#ff66aa;">' + baseHP + '</span></p>' +
    '<p>残りエネルギー: <span style="color:#ffff66;">' + energy + '</span></p>' +
    '<p>設置タワー数: ' + towers.length + '</p>' +
    '<button onclick="startDefenseGame()">▶ NEW GAME</button>';
}

const UPGRADES = [
  { name:'Energy Boost', desc:'+50 エネルギー', apply:function(){ energy += 50; } },
  { name:'Photon Power', desc:'Photon砲のダメージ +30%', apply:function(){ TOWER_TYPES[0].baseDmg *= 1.3; } },
  { name:'Pulse Rate', desc:'Pulse Laserの連射 +25%', apply:function(){ TOWER_TYPES[1].baseRate *= 0.8; } },
  { name:'Resonance Range', desc:'Resonance塔の射程 +25%', apply:function(){ TOWER_TYPES[2].range *= 1.25; } },
  { name:'Disruptor Power', desc:'Disruptorのダメージ +50%', apply:function(){ TOWER_TYPES[3].baseDmg *= 1.5; } },
  { name:'All Towers +15% DMG', desc:'全タワーのダメージ +15%', apply:function(){ TOWER_TYPES.forEach(t => t.baseDmg *= 1.15); } },
  { name:'All Towers +15% Range', desc:'全タワーの射程 +15%', apply:function(){ TOWER_TYPES.forEach(t => t.range *= 1.15); } },
  { name:'Base Repair', desc:'基地HP +30', apply:function(){ baseHP = Math.min(150, baseHP + 30); } },
  { name:'Tower Discount', desc:'全タワーのコスト -20%', apply:function(){ TOWER_TYPES.forEach(t => t.cost = Math.floor(t.cost * 0.8)); } }
];

function pickUpgrades(n) {
  n = n || 3;
  const pool = UPGRADES.slice();
  const result = [];
  for (let i=0; i<n && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return result;
}

function showUpgradeChoice() {
  state = STATE.UPGRADE;
  const choices = pickUpgrades(3);
  overlay.style.display = 'flex';
  let html = '<h2>WAVE ' + wave + ' CLEAR</h2>' +
    '<p>強化を1つ選択してください</p>' +
    '<p class="small">ボーナスエネルギー獲得: +' + (30 + (wave-1)*5) + '⚡</p>' +
    '<div class="cards">';
  for (let i=0; i<choices.length; i++) {
    html += '<div class="card" onclick="applyUpgrade(' + i + ')">' +
      '<h3>' + choices[i].name + '</h3>' +
      '<p>' + choices[i].desc + '</p></div>';
  }
  html += '</div>';
  modal.innerHTML = html;
  window._currentChoices = choices;
}

function applyUpgrade(i) {
  sound.playSelect();
  window._currentChoices[i].apply();
  overlay.style.display = 'none';
  state = STATE.PLAYING;
  updateUI();
}

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

window.startDefenseGame = startDefenseGame;
window.showTitle = showTitle;
window.applyUpgrade = applyUpgrade;
window.sound = sound;

showTitle();
updateUI();
</script>
</body>
