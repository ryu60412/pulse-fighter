<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pulse Architect v2 (with Sound)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a14;
    color: #e0e0ff;
    font-family: 'Consolas', 'Courier New', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column;

  h1 {
    font-size: 44px;
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .subtitle { color:#8888aa; margin-bottom:18px; font-size:13px; letter-spacing:2px; }
  #wrap { position:relative; }
  canvas {
    background:#05050d;
    border:1px solid #1a1a3a;
    box-shadow: 0 0 40px rgba(0,255,255,0.15);
    display:block;
  }
  #ui {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
  }
  .panel {
    position:absolute;
    background: rgba(10,10,25,0.85);
    border: 1px solid #2a2a55;
    padding: 10px 14px;
    border-radius:4px;
    pointer-events:auto;
    backdrop-filter: blur(4px);

    top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between; align-items:center;
    background: transparent; border:none; gap:10px;
  }
  .stat { background: rgba(10,10,25,0.85); border:1px solid #2a2a55; padding:8px 12px; border-radius:4px; }
  .hp-bar-bg { width:200px; height:14px; background:#1a1a2a; border:1px solid #2a2a55; border-radius:2px; overflow:hidden; }
  .hp-bar { height:100%; background: linear-gradient(90deg,#ff0066,#ff4488); transition: width 0.2s; }
  #vol-panel { display:flex; align-items:center; gap:6px; }
  #vol-panel input[type=range] { width:70px; }
  #mute-btn {
    background:transparent;
    border:1px solid #2a2a55;
    color:#aaaadd;
    padding:2px 8px;
    cursor:pointer;
    border-radius:2px;
    font-size:14px;

  #mute-btn:hover { border-color:#00ffff; color:#00ffff; }
  #waveform-panel {
    bottom:10px; left:10px; right:10px;
    display:flex; gap:12px;
  }
  #osc {
    flex:1.5;
    background:#05050f;
    border:1px solid #1a3a3a;
    border-radius:4px;
    padding:8px;
  }
  #osc-canvas { width:100%; height:100px; display:block; }
  #sliders { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .slider-group { background:rgba(20,20,40,0.6); padding:6px 10px; border-radius:4px; border:1px solid #2a2a55; }
  .slider-label { font-size:11px; color:#aaaadd; display:flex; justify-content:space-between; margin-bottom:4px; }
  .slider-label .val { color:#00ffff; font-weight:bold; }
  input[type=range] {
    width:100%;
    -webkit-appearance:none;
    height:4px;
    background:#1a1a3a;
    border-radius:2px;
    outline:none;

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:14px; height:14px; border-radius:50%;
    background:#00ffff;
    cursor:pointer;
    box-shadow:0 0 6px #00ffff;
  }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,10,0.85);
    pointer-events:auto;
    z-index:10;
  }
  .modal {
    background:#0a0a1f;
    border:1px solid #2a2a55;
    padding:32px;
    border-radius:8px;
    text-align:center;

  .modal p { color:#aaaadd; margin-bottom:16px; }
  button {
    background:transparent;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:10px 24px;
    font-family:inherit;
    font-size:14px;
    letter-spacing:2px;
    cursor:pointer;
    border-radius:2px;
    transition: all 0.2s;

  button:hover { background:#00ffff; color:#0a0a1f; box-shadow:0 0 16px #00ffff; }
  .cards { display:flex; gap:16px; margin-top:20px; }

    background:#0a0a1f;
    border:1px solid #2a2a55;
    padding:20px;
    width:180px;
    border-radius:4px;
    cursor:pointer;

  .card.epic { border-color:#cc44ff; }
  .card.epic:hover { box-shadow:0 0 20px rgba(204,68,255,0.4); }
  .card h3 { color:#00ffff; margin-bottom:8px; font-size:14px; }
  .card.epic h3 { color:#ff44ff; }
  .card p { color:#aaaadd; font-size:12px; line-height:1.4; }
  #floor-info { color:#00ffff; font-weight:bold; }
  .small { font-size:10px; color:#666688; }

<body>

<h1>PULSE ARCHITECT</h1>
<div class="subtitle">— 波形を設計し戦うローグライク (v2 / with sound) —</div>

<div id="wrap">
  <canvas id="game" width="900" height="600"></canvas>
  <div id="ui">
    <div id="topbar">
      <div class="stat">
        <div class="small">HP</div>
        <div class="hp-bar-bg"><div class="hp-bar" id="hpbar" style="width:100%"></div></div>
      </div>

    <div class="panel" id="waveform-panel">

      </div>
      <div id="sliders">
        <div class="slider-group">
          <div class="slider-label">Cap (容量) <span class="val" id="cap-val">50</span></div>
          <input type="range" id="cap" min="0" max="100" value="50">

        <div class="slider-group">

        <div class="slider-group">
          <div class="slider-label">Pulse (長さ) <span class="val" id="pulse-val">50</span></div>

        <div class="slider-group">
          <div class="slider-label">Noise (ノイズ) <span class="val" id="noise-val">20</span></div>
          <input type="range" id="noise" min="0" max="100" value="20">

  <div id="overlay">
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<div style="color:#555577; margin-top:16px; font-size:12px;">
  WASD: 移動 / Mouse: 照準 / Click: 攻撃 / 下部スライダー: 波形を設計
</div>

<script>
// ============================================================
// SOUND ENGINE (Web Audio API)
// ============================================================
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.muted = false;
    this.volume = 0.4;
    this.activeNodes = 0;
    this.MAX_NODES = 30;
  }
  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.muted ? 0 : this.volume;
    const comp = this.ctx.createDynamicsCompressor();
    comp.threshold.value = -12;
    comp.knee.value = 20;
    comp.ratio.value = 6;
    comp.attack.value = 0.003;
    comp.release.value = 0.25;
    this.master.connect(comp);
    comp.connect(this.ctx.destination);
  }
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }
  setVolume(v) {
    this.volume = v;
    if (this.master && !this.muted) this.master.gain.value = v;
  }
  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.value = this.muted ? 0 : this.volume;
    return this.muted;
  }
  _env(gain, attack, duration, peak) {
    const now = this.ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(peak, now + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  }
  playTone(freq, duration, type='sine', volume=0.2) {
    if (!this.ctx || this.activeNodes > this.MAX_NODES) return;
    this.activeNodes++;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    this._env(g, 0.005, duration, volume);
    osc.connect(g); g.connect(this.master);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
    osc.onended = () => { this.activeNodes--; };
  }
  playNoise(duration, volume=0.2, lowpass=null) {
    if (!this.ctx || this.activeNodes > this.MAX_NODES) return;
    this.activeNodes++;
    const size = Math.floor(this.ctx.sampleRate * duration);
    const buf = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<size; i++) data[i] = Math.random()*2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const g = this.ctx.createGain();
    this._env(g, 0.002, duration, volume);
    let node = src;
    if (lowpass) {
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = lowpass;
      src.connect(filt); filt.connect(g);
    } else {
      src.connect(g);
    }
    g.connect(this.master);
    src.start();
    src.onended = () => { this.activeNodes--; };
  }
  // === GAME SFX ===
  playShoot(wave) {
    if (!this.ctx) return;
    const baseFreq = 700 + wave.pulse * 5;
    const dur = 0.07 + wave.cap / 1500;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'square';
    const now = this.ctx.currentTime;
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq*0.5, now+dur);
    this._env(g, 0.003, dur, 0.10);
    osc.connect(g); g.connect(this.master);
    osc.start(); osc.stop(now+dur);
  }
  playHit() {
    this.playNoise(0.05, 0.12, 2000);
    this.playTone(150, 0.08, 'sawtooth', 0.12);
  }
  playCrit() {
    this.playTone(1200, 0.12, 'square', 0.16);
    setTimeout(() => this.playTone(1800, 0.08, 'square', 0.12), 30);
  }
  playKill() {
    this.playNoise(0.2, 0.18, 1500);
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sawtooth';
    const now = this.ctx.currentTime;
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(40, now+0.3);
    this._env(g, 0.003, 0.3, 0.16);
    osc.connect(g); g.connect(this.master);
    osc.start(); osc.stop(now+0.3);
  }
  playDamage() {
    this.playNoise(0.15, 0.22, 800);
    this.playTone(80, 0.2, 'square', 0.18);
  }
  playSelect() {
    this.playTone(800, 0.05, 'sine', 0.15);
    setTimeout(() => this.playTone(1200, 0.08, 'sine', 0.15), 50);
  }
  playHover() {
    this.playTone(600, 0.03, 'sine', 0.08);
  }
  playFloorClear() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.18, 'triangle', 0.16), i*80);
    });
  }
  playGameOver() {
    [400, 300, 200].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.4, 'sawtooth', 0.2), i*200);
    });
  }
}

// ============================================================
// BGM PLAYER (synthesized)
// ============================================================
class BGMPlayer {
  constructor(soundEngine) {
    this.se = soundEngine;
    this.playing = false;
    this.bus = null;
    this.timer = null;
    this.step = 0;
    // Am pentatonic loop  (A,C,D,E,G shapes)
    this.lead = [220, 277, 330, 277, 392, 330, 277, 220];
    this.bass = [110, 110, 165, 165];
    this.tempo = 0.32; // sec per note
  }
  start() {
    if (this.playing || !this.se.ctx) return;
    this.playing = true;
    this.step = 0;
    this.bus = this.se.ctx.createGain();
    this.bus.gain.value = 0.5;
    this.bus.connect(this.se.master);
    this._tick();
  }
  _tick() {
    if (!this.playing) return;
    const ctx = this.se.ctx;
    const now = ctx.currentTime;
    // Lead note
    const leadFreq = this.lead[this.step % this.lead.length];
    const oscL = ctx.createOscillator();
    const gL = ctx.createGain();
    oscL.type = 'sawtooth';
    oscL.frequency.value = leadFreq;
    gL.gain.setValueAtTime(0, now);
    gL.gain.linearRampToValueAtTime(0.08, now+0.01);
    gL.gain.exponentialRampToValueAtTime(0.0001, now+this.tempo*0.9);
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 1200;
    oscL.connect(filt); filt.connect(gL); gL.connect(this.bus);
    oscL.start(now);
    oscL.stop(now+this.tempo);
    // Bass note (every 2 steps)
    if (this.step % 2 === 0) {
      const bassFreq = this.bass[(this.step/2) % this.bass.length];
      const oscB = ctx.createOscillator();
      const gB = ctx.createGain();
      oscB.type = 'triangle';
      oscB.frequency.value = bassFreq;
      gB.gain.setValueAtTime(0, now);
      gB.gain.linearRampToValueAtTime(0.12, now+0.02);
      gB.gain.exponentialRampToValueAtTime(0.0001, now+this.tempo*1.6);
      oscB.connect(gB); gB.connect(this.bus);
      oscB.start(now);
      oscB.stop(now+this.tempo*1.8);
    }
    // Hi-hat (noise) on off-beats
    if (this.step % 2 === 1) {
      const size = Math.floor(ctx.sampleRate * 0.05);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i=0;i<size;i++) data[i] = Math.random()*2-1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const hf = ctx.createBiquadFilter();
      hf.type = 'highpass';
      hf.frequency.value = 6000;
      const gH = ctx.createGain();
      gH.gain.setValueAtTime(0.05, now);
      gH.gain.exponentialRampToValueAtTime(0.0001, now+0.05);
      src.connect(hf); hf.connect(gH); gH.connect(this.bus);
      src.start(now);
    }
    this.step++;
    this.timer = setTimeout(() => this._tick(), this.tempo*1000);
  }
  stop() {
    this.playing = false;
    if (this.timer) clearTimeout(this.timer);
    if (this.bus && this.se.ctx) {
      const now = this.se.ctx.currentTime;
      this.bus.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
      setTimeout(() => { try { this.bus.disconnect(); } catch(e){} }, 600);
    }
  }
}

const sound = new SoundEngine();
const bgm = new BGMPlayer(sound);

// ============================================================
// GAME CORE
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const oscCanvas = document.getElementById('osc-canvas');
const oscCtx = oscCanvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const STATE = { TITLE:0, PLAYING:1, UPGRADE:2, GAMEOVER:3 };
let state = STATE.TITLE;

const player = {
  x: W/2, y: H/2, r: 12,
  hp: 100, maxHp: 100,
  speed: 3.5,
  fireCooldown: 0,
  baseDamage: 10,
  baseFireRate: 0.5,
  critMult: 2.0,
  damageSoundCooldown: 0
};
const wave = { cap:50, r:30, pulse:50, noise:20 };
const mods = {
  dmgMult: 1.0, hpBonus: 0, fireRateMult: 1.0,
  critBonus: 0, speedMult: 1.0
};
let bullets = [], enemies = [], particles = [], damageNumbers = [];
let floor = 1, enemiesRemaining = 0;
let waveTime = 0;

const keys = {};
const mouse = { x: W/2, y: H/2, down:false };
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', () => { mouse.down = true; sound.resume(); });
canvas.addEventListener('mouseup', () => mouse.down = false);

// Sliders
['cap','r','pulse','noise'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    wave[id] = parseInt(el.value);
    document.getElementById(id+'-val').textContent = wave[id];
    updateDpsDisplay();
  });
});

// Volume + Mute UI
document.getElementById('volume').addEventListener('input', e => {
  sound.setVolume(parseInt(e.target.value)/100 * 0.8);
});
document.getElementById('mute-btn').addEventListener('click', e => {
  const muted = sound.toggleMute();
  e.target.textContent = muted ? '🔇' : '🔊';
});

// Damage math
function calcDamage() {
  return player.baseDamage * (1+wave.cap/100) * (1-wave.r/300) *
         (1+wave.pulse/100) * mods.dmgMult;
}
function calcFireRate() {
  const capPen = 1 - wave.cap/300;
  const pulsePen = 1 - wave.pulse/400;
  return player.baseFireRate / (capPen * pulsePen) / mods.fireRateMult;
}
function calcCritRate() {
  return 0.05 + wave.noise * 0.005 + mods.critBonus;
}
function calcAccuracy() {
  return 1 - wave.noise/250;
}
function calcDPS() {
  const d = calcDamage();
  const rate = calcFireRate();
  const crit = calcCritRate();
  return d * (1 + crit*(player.critMult-1)) / rate;
}
function updateDpsDisplay() {
  document.getElementById('dps-val').textContent = Math.round(calcDPS());
}

// Floor / enemies
function spawnFloor() {
  enemies = [];
  const count = 4 + floor*2;
  const hp = Math.round(30 * Math.pow(1.18, floor-1));
  const speed = 1.2 + floor*0.05;
  const atk = Math.round(5 * Math.pow(1.12, floor-1));
  for (let i=0; i<count; i++) {
    let x,y;
    const s = Math.floor(Math.random()*4);
    if (s===0){x=Math.random()*W;y=-20;}
    else if(s===1){x=W+20;y=Math.random()*H;}
    else if(s===2){x=Math.random()*W;y=H+20;}
    else {x=-20;y=Math.random()*H;}
    enemies.push({x,y,r:14,hp,maxHp:hp,speed,atk,hitFlash:0});
  }
  enemiesRemaining = count;
  document.getElementById('floor-info').textContent =
    `FLOOR ${floor} / 残り敵: ${enemiesRemaining}`;
}

function shoot() {
  const dx = mouse.x - player.x;
  const dy = mouse.y - player.y;
  const dist = Math.hypot(dx,dy) || 1;
  const jitter = (1 - calcAccuracy()) * 0.4;
  const ang = Math.atan2(dy,dx) + (Math.random()-0.5)*jitter;
  const speed = 9;
  const dmg = calcDamage();
  const isCrit = Math.random() < calcCritRate();
  const thickness = 2 + wave.cap/30;
  const life = 0.4 + wave.pulse/120;
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed,
    dmg: isCrit ? dmg*player.critMult : dmg,
    crit: isCrit, thickness, life
  });
  sound.playShoot(wave);
}

// Main loop
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;
  if (state === STATE.PLAYING) update(dt);
  render();
  drawOscilloscope(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt) {
  // Move
  let mx=0,my=0;
  if (keys['w']) my -= 1;
  if (keys['s']) my += 1;
  if (keys['a']) mx -= 1;
  if (keys['d']) mx += 1;
  const m = Math.hypot(mx,my) || 1;
  player.x += (mx/m)*player.speed*mods.speedMult*dt*60;
  player.y += (my/m)*player.speed*mods.speedMult*dt*60;
  player.x = Math.max(player.r, Math.min(W-player.r, player.x));
  player.y = Math.max(player.r+50, Math.min(H-player.r-150, player.y));

  // Fire
  player.fireCooldown -= dt;
  if (mouse.down && player.fireCooldown <= 0) {
    shoot();
    player.fireCooldown = calcFireRate();
  }

  player.damageSoundCooldown -= dt;

  // Bullets
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life -= dt;
    if (b.life<=0 || b.x<0||b.x>W||b.y<0||b.y>H) {
      bullets.splice(i,1); continue;
    }
    for (let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x-e.x, b.y-e.y) < e.r+3) {
        e.hp -= b.dmg;
        e.hitFlash = 0.15;
        damageNumbers.push({
          x:e.x, y:e.y-10,
          text: Math.round(b.dmg).toString(),
          life:0.6, crit:b.crit
        });
        if (b.crit) sound.playCrit(); else sound.playHit();
        bullets.splice(i,1);
        if (e.hp<=0) {
          for (let k=0;k<8;k++) {
            particles.push({
              x:e.x,y:e.y,
              vx:(Math.random()-0.5)*4,
              vy:(Math.random()-0.5)*4,
              life:0.5,color:'#ff4488'
            });
          }
          sound.playKill();
          enemies.splice(j,1);
          enemiesRemaining--;
          document.getElementById('floor-info').textContent =
            `FLOOR ${floor} / 残り敵: ${enemiesRemaining}`;
        }
        break;
      }
    }
  }

  // Enemies
  for (const e of enemies) {
    const dx = player.x-e.x, dy = player.y-e.y;
    const d = Math.hypot(dx,dy)||1;
    e.x += (dx/d)*e.speed;
    e.y += (dy/d)*e.speed;
    e.hitFlash = Math.max(0, e.hitFlash-dt);
    if (d < e.r + player.r) {
      player.hp -= e.atk*dt*2;
      if (player.damageSoundCooldown <= 0) {
        sound.playDamage();
        player.damageSoundCooldown = 0.4;
      }
      if (player.hp <= 0) {
        player.hp = 0;
        showGameOver();
      }
    }
  }
  document.getElementById('hpbar').style.width =
    (Math.max(0,player.hp)/player.maxHp*100) + '%';

  for (let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }
  for (let i=damageNumbers.length-1;i>=0;i--) {
    const d = damageNumbers[i];
    d.y -= 30*dt; d.life -= dt;
    if (d.life<=0) damageNumbers.splice(i,1);
  }

  if (enemiesRemaining===0 && state===STATE.PLAYING) {
    showUpgradeChoice();
  }
}

function render() {
  ctx.fillStyle = '#05050d';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(40,40,80,0.4)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<H;y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (state === STATE.TITLE) return;

  for (const p of particles) {
    ctx.globalAlpha = p.life*2;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha = 1;

  for (const e of enemies) {
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fillStyle = e.hitFlash>0 ? '#ffffff' : '#ff3366';
    ctx.shadowColor = '#ff3366';
    ctx.shadowBlur = 15;
    ctx.fill();
    ctx.shadowBlur = 0;
    const w=30,h=3;
    ctx.fillStyle = '#330011';
    ctx.fillRect(e.x-w/2,e.y-e.r-8,w,h);
    ctx.fillStyle = '#ff66aa';
    ctx.fillRect(e.x-w/2,e.y-e.r-8,w*(e.hp/e.maxHp),h);
  }

  for (const b of bullets) {
    ctx.beginPath();
    ctx.lineCap = 'round';
    ctx.strokeStyle = b.crit ? '#ff44ff' : '#00ffff';
    ctx.shadowColor = b.crit ? '#ff44ff' : '#00ffff';
    ctx.shadowBlur = 12;
    ctx.lineWidth = b.thickness;
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x-b.vx,b.y-b.vy);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fillStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.shadowBlur = 0;

  const ax = mouse.x-player.x, ay = mouse.y-player.y;
  const am = Math.hypot(ax,ay)||1;
  ctx.strokeStyle = 'rgba(0,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y);
  ctx.lineTo(player.x+ax/am*40,player.y+ay/am*40);
  ctx.stroke();

  ctx.font = 'bold 14px Consolas';
  ctx.textAlign = 'center';
  for (const d of damageNumbers) {
    ctx.globalAlpha = Math.min(1,d.life*2);
    ctx.fillStyle = d.crit ? '#ff44ff' : '#ffff88';
    ctx.fillText(d.text+(d.crit?'!':''), d.x, d.y);
  }
  ctx.globalAlpha = 1;
}

function drawOscilloscope(dt) {
  waveTime += dt;
  const w = oscCanvas.width, h = oscCanvas.height;
  oscCtx.fillStyle = '#05050f';
  oscCtx.fillRect(0,0,w,h);
  oscCtx.strokeStyle = 'rgba(40,80,80,0.4)';
  oscCtx.lineWidth = 1;
  for (let x=0;x<w;x+=50) { oscCtx.beginPath(); oscCtx.moveTo(x,0); oscCtx.lineTo(x,h); oscCtx.stroke(); }
  oscCtx.beginPath(); oscCtx.moveTo(0,h/2); oscCtx.lineTo(w,h/2); oscCtx.stroke();

  oscCtx.beginPath();
  oscCtx.strokeStyle = '#00ffff';
  oscCtx.shadowColor = '#00ffff';
  oscCtx.shadowBlur = 8;
  oscCtx.lineWidth = 1.8;
  const amp = (wave.cap/100)*(h*0.35) + 8;
  const freq = 0.02 + wave.pulse*0.0008;
  const damp = 1 - wave.r/250;
  for (let x=0;x<w;x++) {
    const phase = x*freq + waveTime*4;
    const base = Math.sin(phase)*amp*damp;
    const noise = (Math.random()-0.5)*(wave.noise/100)*30;
    const y = h/2 + base + noise;
    if (x===0) oscCtx.moveTo(x,y); else oscCtx.lineTo(x,y);
  }
  oscCtx.stroke();
  oscCtx.shadowBlur = 0;
}

// Overlays
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal-content');

function showTitle() {
  state = STATE.TITLE;
  overlay.style.display = 'flex';
  modal.innerHTML = `
    <h2>PULSE ARCHITECT</h2>
    <p>波形を設計し、襲い来る敵を撃破せよ。<br>全フロアを生き残れ。</p>
    <p class="small" style="margin:16px 0;">
    WASD: 移動 / Mouse: 照準 / Click: 攻撃<br>
    下部スライダーで波形を設計 → 攻撃性能が変わる<br>
    🎵 音が鳴ります。右上で音量調整可能
    </p>
    <button onclick="startGame()">▶ START</button>
  `;
}

function startGame() {
  if (!sound.ctx) sound.init();
  sound.resume();
  bgm.start();
  overlay.style.display = 'none';
  state = STATE.PLAYING;
  floor = 1;
  player.hp = player.maxHp = 100 + mods.hpBonus;
  player.x = W/2; player.y = H/2;
  bullets=[]; enemies=[]; particles=[];
  spawnFloor();
  updateDpsDisplay();
}

function showGameOver() {
  state = STATE.GAMEOVER;
  bgm.stop();
  sound.playGameOver();
  overlay.style.display = 'flex';
  modal.innerHTML = `
    <h2 style="color:#ff44ff;">RUN FAILED</h2>
    <p>到達フロア: <span style="color:#00ffff;">${floor}</span></p>
    <p class="small">研究データを保存しました...</p>
    <button onclick="resetRun()">▶ RESTART</button>
  `;
}

function resetRun() {
  mods.dmgMult=1; mods.hpBonus=0; mods.fireRateMult=1;
  mods.critBonus=0; mods.speedMult=1;
  player.critMult = 2.0;
  startGame();
}

const UPGRADES = [
  { name:'Capacitor Bank', rare:'common', desc:'攻撃力 +20%', apply:()=>mods.dmgMult*=1.2 },
  { name:'Iron Shell', rare:'common', desc:'最大HP +30', apply:()=>{mods.hpBonus+=30;player.maxHp+=30;player.hp+=30;}},
  { name:'Signal Booster', rare:'common', desc:'連射速度 +15%', apply:()=>mods.fireRateMult*=1.15 },
  { name:'Noise Generator', rare:'common', desc:'クリ率 +10%', apply:()=>mods.critBonus+=0.10 },
  { name:'Cooling Fan', rare:'common', desc:'移動速度 +20%', apply:()=>mods.speedMult*=1.2 },
  { name:'Auto Repair', rare:'common', desc:'HP全回復', apply:()=>player.hp=player.maxHp },
  { name:'Resonance Driver', rare:'epic', desc:'攻撃力 +50% / 連射 +20%', apply:()=>{mods.dmgMult*=1.5;mods.fireRateMult*=1.2;}},
  { name:'Tesla Loop', rare:'epic', desc:'クリ倍率 ×1.5', apply:()=>{player.critMult*=1.5;}},
  { name:'Quantum Emitter', rare:'epic', desc:'攻撃力 ×1.8', apply:()=>mods.dmgMult*=1.8 },
];

function pickUpgrades(n=3) {
  const pool = UPGRADES.slice();
  const epicChance = Math.min(0.5, 0.05+floor*0.05);
  const result = [];
  for (let i=0;i<n;i++) {
    const wantEpic = Math.random() < epicChance;
    let cand = pool.filter(u => wantEpic ? u.rare==='epic' : u.rare==='common');
    if (cand.length===0) cand = pool;
    const ch = cand[Math.floor(Math.random()*cand.length)];
    result.push(ch);
    const idx = pool.indexOf(ch);
    if (idx>=0) pool.splice(idx,1);
  }
  return result;
}

function showUpgradeChoice() {
  state = STATE.UPGRADE;
  sound.playFloorClear();
  const choices = pickUpgrades(3);
  overlay.style.display = 'flex';
  modal.innerHTML = `
    <h2>FLOOR ${floor} CLEAR</h2>
    <p>強化を1つ選択してください</p>
    <div class="cards">
      ${choices.map((c,i)=>`
        <div class="card ${c.rare==='epic'?'epic':''}"
             onmouseenter="sound.playHover()"
             onclick="applyUpgrade(${i})">
          <h3>${c.name}</h3>
          <p>${c.desc}</p>
          <p class="small" style="margin-top:8px;color:${c.rare==='epic'?'#cc44ff':'#888'}">
            ${c.rare.toUpperCase()}
          </p>
        </div>
      `).join('')}
    </div>
  `;
  window._currentChoices = choices;
}

function applyUpgrade(i) {
  sound.playSelect();
  window._currentChoices[i].apply();
  overlay.style.display = 'none';
  floor++;
  state = STATE.PLAYING;
  spawnFloor();
  updateDpsDisplay();
}

window.startGame = startGame;
window.resetRun = resetRun;
window.applyUpgrade = applyUpgrade;
window.sound = sound;

showTitle();
updateDpsDisplay();
</script>
